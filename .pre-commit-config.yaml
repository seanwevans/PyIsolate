repos:
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
  - repo: https://github.com/PyCQA/pylint
    rev: v3.2.2
    hooks:
      - id: pylint
        # The hook runs in an isolated env; give it the runtime deps so imports
        # resolve and the score matches a normal install instead of being
        # dragged down by spurious import-error findings.
        additional_dependencies: [pyyaml, cryptography]
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        # types-PyYAML: mypy reports missing PyYAML stubs even with
        # ignore_missing_imports, because typeshed tracks them separately.
        additional_dependencies: [types-PyYAML]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        # python -m pytest keeps the hook on the interpreter the package is
        # installed into; a bare ``pytest`` can resolve to an unrelated
        # standalone install on PATH.
        entry: python -m pytest -q
        language: system
        pass_filenames: false

name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"

jobs:
  tests-unit:
    name: unit / py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Run baseline test suite
        run: pytest -q -m "not soak"

  tests-hardening:
    name: hardening / ${{ matrix.slice }} / py${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        slice:
          - adversarial
          - runaway_cpu
          - memory_exhaustion
          - import_escape
          - policy_bypass
          - race
          - crash_injection
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Run hardening slice
        run: pytest -q tests/test_matrix_hardening.py -m "${{ matrix.slice }}"

  tests-no-gil:
    name: no-gil race / py3.13t
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13t"
      - name: Install dependencies
        # cryptography/cffi cannot yet build wheels for the free-threaded 3.13
        # build, so a normal ``.[dev]`` install aborts before any test runs.
        # Install pyisolate without that dependency and rely on the suite's
        # crypto stub (tests/conftest.py) so the race tests actually execute.
        # ``--no-deps`` skips *all* runtime deps, so re-add the pure-Python ones
        # the import path needs (pyyaml, platformdirs) -- everything declared in
        # ``project.dependencies`` except the unbuildable cryptography.
        run: |
          python -m pip install -e . --no-deps
          python -m pip install pytest pyyaml platformdirs
      - name: Run race tests under free-threaded build
        run: pytest -q tests/test_matrix_hardening.py -m "race and no_gil"

  tests-soak:
    name: soak / 2k spawn-kill cycles
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Run soak test
        env:
          PYISOLATE_SOAK_CYCLES: "2000"
        run: pytest -q tests/test_matrix_hardening.py -m soak

  tests-cross-kernel:
    name: kernel smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - name: Kernel info
        run: uname -a
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Run kernel-facing tests
        run: pytest -q tests/test_bpf_manager.py tests/test_watchdog.py tests/test_cgroup.py
      - name: Run process-backend confinement tests
        run: pytest -q tests/test_process_backend.py tests/test_process_confinement.py tests/test_landlock.py
      - name: Run live Landlock enforcement (kernels that support it)
        env:
          PYISOLATE_LIVE_LANDLOCK_TESTS: "1"
        run: pytest -q tests/test_landlock.py

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Run tests with coverage
        run: coverage run -m pytest -m "not soak"
      - name: Generate coverage report
        run: coverage xml -o coverage.xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
